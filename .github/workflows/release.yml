name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          
      - name: Enable Desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Compress Release
        run: Compress-Archive -Path build\windows\runner\Release\* -DestinationPath PhotoTimeFixer-Windows.zip
        
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: PhotoTimeFixer-Windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          
      - name: Enable Desktop
        run: flutter config --enable-linux-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux
        run: flutter build linux --release
        
      - name: Compress Release
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../PhotoTimeFixer-Linux.tar.gz *
          
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: PhotoTimeFixer-Linux.tar.gz

  create-release:
    name: Create Release
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            PhotoTimeFixer-Windows.zip
            PhotoTimeFixer-Linux.tar.gz
          generate_release_notes: true
